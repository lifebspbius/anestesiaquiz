<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AnestesiQuiz — Belajar Anestesiologi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0d1b2a;--deep:#1b3a5c;--steel:#2e6da4;
  --accent:#e8a020;--accent2:#f5c85a;
  --success:#1a7a4a;--danger:#c0392b;--warn:#e67e22;
  --bg:#eef2f7;--card:#fff;--border:#d0dbe8;
  --text:#1a2535;--muted:#5a6a7e;
  --sidebar-w:260px;
}
html,body{height:100%;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg);}
.app{display:flex;height:100vh;overflow:hidden;}

/* STATUS BAR */
.status-bar{display:flex;align-items:center;gap:7px;padding:5px 14px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.3px;border-bottom:1px solid transparent;transition:all 0.3s;}
.status-bar.cfg{background:#e8f4fb;color:#1565c0;border-color:#90caf9;}
.status-bar.ok{background:#edfaf3;color:#1a7a4a;border-color:#8fd3b1;}
.status-bar.off{background:#fff8e1;color:#e65100;border-color:#ffcc80;}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cfg .sdot{background:#1565c0;}.ok .sdot{background:#1a7a4a;}.off .sdot{background:#e65100;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--navy);display:flex;flex-direction:column;overflow:hidden;z-index:100;transition:transform 0.3s;}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.08);}
.logo-badge{display:inline-block;background:var(--accent);color:var(--navy);font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1.5px;padding:3px 9px;border-radius:20px;margin-bottom:8px;text-transform:uppercase;}
.logo-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:900;color:#fff;line-height:1.2;}
.logo-title span{color:var(--accent2);}
.logo-sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:3px;}
.sb-sec{padding:12px 16px 4px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);}
.sb-list{flex:1;overflow-y:auto;padding-bottom:8px;}
.sb-list::-webkit-scrollbar{width:3px;}
.sb-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px;}
.sb-item{margin:2px 8px;border-radius:10px;cursor:pointer;}
.sb-item-inner{padding:9px 12px;display:flex;align-items:center;gap:9px;border-radius:10px;transition:background 0.15s;}
.sb-item:hover .sb-item-inner{background:rgba(255,255,255,0.06);}
.sb-item.active .sb-item-inner{background:rgba(232,160,32,0.15);border-left:3px solid var(--accent);}
.sb-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.sb-info{flex:1;min-width:0;}
.sb-name{font-size:12.5px;font-weight:500;color:rgba(255,255,255,0.88);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-meta{font-size:10px;color:rgba(255,255,255,0.38);margin-top:1px;font-family:'JetBrains Mono',monospace;}
.sb-prog{width:100%;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:5px;overflow:hidden;}
.sb-prog-fill{height:3px;background:var(--accent);border-radius:2px;transition:width 0.3s;}
.sb-footer{padding:10px 12px;border-top:1px solid rgba(255,255,255,0.08);}
.btn-upload{width:100%;padding:9px 12px;background:rgba(232,160,32,0.15);border:1px solid rgba(232,160,32,0.3);border-radius:9px;color:var(--accent2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background 0.15s;}
.btn-upload:hover{background:rgba(232,160,32,0.25);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 18px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-menu{width:34px;height:34px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:none;align-items:center;justify-content:center;}
.topbar-menu svg{width:19px;height:19px;stroke:var(--muted);stroke-width:2;fill:none;}
.topbar-title{font-size:14px;font-weight:500;color:var(--text);flex:1;}
.topbar-crumb{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.content{flex:1;overflow-y:auto;padding:18px;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* DASHBOARD */
.dash-hero{background:linear-gradient(135deg,var(--navy),var(--deep));border-radius:14px;padding:24px 20px;margin-bottom:18px;position:relative;overflow:hidden;}
.dash-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(232,160,32,0.1);}
.dash-hero h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:#fff;margin-bottom:5px;position:relative;z-index:1;}
.dash-hero h2 span{color:var(--accent2);}
.dash-hero p{font-size:12.5px;color:rgba(255,255,255,0.58);position:relative;z-index:1;}
.dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;position:relative;z-index:1;}
.dash-stat{background:rgba(255,255,255,0.08);border-radius:9px;padding:10px 8px;text-align:center;}
.dash-stat-val{font-size:20px;font-weight:700;color:#fff;font-family:'Playfair Display',serif;}
.dash-stat-lbl{font-size:9.5px;color:rgba(255,255,255,0.48);margin-top:2px;font-family:'JetBrains Mono',monospace;}
.sec-head{font-size:12px;font-weight:500;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin:0 0 10px;display:flex;align-items:center;gap:7px;}
.sec-head::before{content:'';width:18px;height:2px;background:var(--accent);border-radius:2px;}
.bab-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:20px;}
.bab-card{background:var(--card);border-radius:13px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:box-shadow 0.2s,transform 0.15s;box-shadow:0 1px 4px rgba(13,27,42,0.05);}
.bab-card:hover{box-shadow:0 4px 18px rgba(13,27,42,0.1);transform:translateY(-1px);}
.bab-card-top{display:flex;align-items:center;gap:12px;padding:14px 16px;}
.bab-card-icon{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;}
.bab-card-info{flex:1;}
.bab-card-title{font-size:14.5px;font-weight:500;color:var(--text);margin-bottom:2px;}
.bab-card-sub{font-size:11.5px;color:var(--muted);}
.bab-card-bot{border-top:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;}
.prog-track{background:#e8edf5;border-radius:6px;height:5px;flex:1;margin:0 10px;overflow:hidden;}
.prog-fill{height:5px;border-radius:6px;background:linear-gradient(90deg,var(--steel),var(--accent));transition:width 0.4s;}
.prog-pct{font-size:11px;font-weight:600;color:var(--steel);font-family:'JetBrains Mono',monospace;min-width:30px;text-align:right;}
.badge-done{font-size:10px;padding:2px 9px;border-radius:20px;background:#edfaf3;color:var(--success);font-family:'JetBrains Mono',monospace;}
.badge-new{font-size:10px;padding:2px 9px;border-radius:20px;background:#e8f0fa;color:var(--steel);font-family:'JetBrains Mono',monospace;}
.upload-zone{border:2px dashed var(--border);border-radius:13px;padding:28px 18px;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;background:var(--card);}
.upload-zone:hover,.upload-zone.drag{border-color:var(--steel);background:#f0f5fb;}
.upload-zone-icon{font-size:32px;margin-bottom:8px;}
.upload-zone-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:5px;}
.upload-zone-sub{font-size:11.5px;color:var(--muted);line-height:1.6;}

/* BAB DETAIL */
.bab-hero{border-radius:14px;padding:20px 18px;margin-bottom:16px;position:relative;overflow:hidden;}
.bab-hero::before{content:'';position:absolute;top:-25px;right:-25px;width:130px;height:130px;border-radius:50%;background:rgba(232,160,32,0.12);}
.bab-hero-badge{display:inline-block;background:var(--accent);color:var(--navy);font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px;margin-bottom:9px;position:relative;z-index:1;}
.bab-hero h2{font-family:'Playfair Display',serif;font-size:19px;font-weight:900;color:#fff;line-height:1.3;margin-bottom:5px;position:relative;z-index:1;}
.bab-hero p{font-size:11.5px;color:rgba(255,255,255,0.58);position:relative;z-index:1;}
.bab-pills{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;position:relative;z-index:1;}
.bab-pill{background:rgba(255,255,255,0.1);border-radius:20px;padding:4px 11px;font-size:10.5px;color:rgba(255,255,255,0.78);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:5px;}
.bab-pill .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);}

/* SCENARIO */
.scen-card{background:var(--card);border-radius:13px;border:1px solid var(--border);overflow:hidden;margin-bottom:14px;box-shadow:0 1px 5px rgba(13,27,42,0.05);}
.scen-hdr{background:linear-gradient(90deg,var(--deep),var(--steel));padding:11px 16px;display:flex;align-items:center;gap:7px;}
.scen-hdr span{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);}
.scen-hdr .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
.scen-body{padding:14px 16px;}
.scen-body p{font-size:13px;line-height:1.75;color:var(--text);margin-bottom:8px;}
.scen-body strong{color:var(--deep);}
.vital-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:6px;}
.vi{background:var(--bg);border-radius:9px;padding:9px 7px;text-align:center;border:1px solid var(--border);}
.vi.alert{border-color:var(--danger);background:#fdf0ef;}
.vi.warn{border-color:var(--warn);background:#fef9ec;}
.vi-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:3px;}
.vi-val{font-size:16px;font-weight:700;color:var(--deep);line-height:1;}
.vi-unit{font-size:8px;color:var(--muted);margin-top:1px;}
.vi.alert .vi-val{color:var(--danger);}
.vi.warn .vi-val{color:var(--warn);}

/* SOAL LIST */
.soal-row{background:var(--card);border-radius:11px;border:1px solid var(--border);padding:12px 14px;margin-bottom:7px;display:flex;align-items:flex-start;gap:11px;cursor:pointer;transition:box-shadow 0.15s,transform 0.1s;box-shadow:0 1px 3px rgba(13,27,42,0.04);}
.soal-row:hover{box-shadow:0 3px 10px rgba(13,27,42,0.08);transform:translateX(2px);}
.soal-row.done{border-left:3px solid var(--success);}
.soal-num{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--deep),var(--steel));color:#fff;font-family:'Playfair Display',serif;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.soal-row.done .soal-num{background:linear-gradient(135deg,var(--success),#27ae6e);}
.soal-topic{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.soal-text{font-size:13px;color:var(--text);line-height:1.45;}
.soal-done{font-size:10px;color:var(--success);margin-top:3px;font-family:'JetBrains Mono',monospace;}
.btn-main{width:100%;padding:14px;background:linear-gradient(90deg,var(--deep),var(--steel));color:#fff;border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:14.5px;font-weight:500;cursor:pointer;transition:opacity 0.2s,transform 0.15s;box-shadow:0 4px 14px rgba(27,58,92,0.22);margin-bottom:18px;}
.btn-main:hover{opacity:0.88;transform:translateY(-1px);}

/* QUIZ */
.qpb{background:var(--card);border-radius:11px;padding:11px 14px;margin-bottom:14px;border:1px solid var(--border);}
.qpb-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.qpb-lbl{font-size:11.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.qpb-pct{font-size:11.5px;font-weight:600;color:var(--steel);font-family:'JetBrains Mono',monospace;}
.qpb-track{background:#e8edf5;border-radius:5px;height:5px;overflow:hidden;}
.qpb-fill{height:5px;border-radius:5px;background:linear-gradient(90deg,var(--steel),var(--accent));transition:width 0.4s;}
.q-card{background:var(--card);border-radius:13px;border:1px solid var(--border);overflow:hidden;margin-bottom:14px;box-shadow:0 2px 8px rgba(13,27,42,0.06);}
.q-hdr{background:linear-gradient(90deg,var(--deep),var(--steel));padding:14px 16px;display:flex;gap:11px;align-items:flex-start;}
.q-num-c{width:36px;height:36px;border-radius:50%;background:var(--accent);color:var(--navy);font-family:'Playfair Display',serif;font-size:17px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.q-hdr-topic{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.42);margin-bottom:3px;}
.q-hdr-text{font-family:'Playfair Display',serif;font-size:15.5px;font-weight:700;color:#fff;line-height:1.4;}
.q-body{padding:16px;}
.essay-area{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--text);line-height:1.65;resize:vertical;min-height:115px;background:#fafbfd;outline:none;transition:border-color 0.2s;}
.essay-area:focus{border-color:var(--steel);background:#fff;}
.essay-hint{font-size:11px;color:var(--muted);margin:7px 0 14px;display:flex;align-items:center;gap:5px;}
.btn-submit{width:100%;padding:12px;background:var(--accent);color:var(--navy);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.2s,transform 0.1s;}
.btn-submit:hover:not(:disabled){opacity:0.85;transform:translateY(-1px);}
.btn-submit:disabled{opacity:0.35;cursor:not-allowed;}

/* PEMBAHASAN */
.pembahasan{margin-top:14px;animation:fadeUp 0.35s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(11px);}to{opacity:1;transform:translateY(0);}}
.ans-key{background:linear-gradient(135deg,#edfaf3,#d5f0e3);border:1px solid #8fd3b1;border-left:4px solid var(--success);border-radius:11px;padding:13px 15px;margin-bottom:12px;}
.ak-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--success);margin-bottom:5px;}
.ak-body{font-size:13px;line-height:1.7;color:#1a4a2a;}
.ak-body strong{color:#0f5a32;}
.det-block{background:var(--card);border-radius:11px;border:1px solid var(--border);overflow:hidden;margin-bottom:9px;}
.det-hdr{background:var(--bg);padding:8px 14px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--steel);border-bottom:1px solid var(--border);}
.det-body{padding:11px 14px;}
.det-body p,.det-body li{font-size:12.5px;line-height:1.7;color:var(--text);margin-bottom:5px;}
.det-body ul{padding-left:15px;}
.det-body strong{color:var(--deep);}
.tbl-wrap{overflow-x:auto;margin:7px 0;}
.mini-tbl{width:100%;border-collapse:collapse;font-size:11.5px;}
.mini-tbl thead tr{background:var(--deep);color:#fff;}
.mini-tbl th{padding:6px 9px;text-align:left;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;}
.mini-tbl tbody tr:nth-child(odd){background:#f0f5fb;}
.mini-tbl td{padding:6px 9px;border-bottom:1px solid var(--border);vertical-align:top;}
.callout{border-radius:9px;padding:10px 13px;margin:9px 0;font-size:12.5px;line-height:1.65;display:flex;gap:9px;}
.callout-icon{flex-shrink:0;font-size:16px;margin-top:1px;}
.callout-danger{background:#fdf0ef;border:1px solid #f5b8b4;}
.callout-warning{background:#fef9ec;border:1px solid #f5d68a;}
.callout-info{background:#eef4fb;border:1px solid #b4d0ef;}
.callout-success{background:#edfaf3;border:1px solid #8fd3b1;}
.callout div{flex:1;}
.cite-block{background:var(--navy);border-radius:9px;padding:10px 13px;margin-top:10px;border-left:3px solid var(--accent);}
.cite-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);margin-bottom:6px;}
.cite-item{font-size:11px;color:rgba(255,255,255,0.68);line-height:1.5;margin-bottom:3px;font-family:'JetBrains Mono',monospace;}
.btn-next{width:100%;padding:13px;background:linear-gradient(90deg,var(--deep),var(--steel));color:#fff;border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:18px;box-shadow:0 4px 14px rgba(27,58,92,0.2);transition:opacity 0.2s,transform 0.15s;}
.btn-next:hover{opacity:0.88;transform:translateY(-1px);}

/* RESULT */
.result-hero{background:linear-gradient(135deg,var(--navy),var(--deep));border-radius:14px;padding:26px 18px;text-align:center;margin-bottom:18px;}
.result-circle{width:96px;height:96px;border-radius:50%;background:rgba(255,255,255,0.1);border:3px solid var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 14px;}
.result-num{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:#fff;}
.result-num-lbl{font-size:9.5px;color:rgba(255,255,255,0.52);font-family:'JetBrains Mono',monospace;}
.result-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:#fff;margin-bottom:5px;}
.result-sub{font-size:12.5px;color:rgba(255,255,255,0.58);}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;}
.rs-box{background:rgba(255,255,255,0.08);border-radius:9px;padding:10px 7px;text-align:center;}
.rs-val{font-size:19px;font-weight:700;color:#fff;font-family:'Playfair Display',serif;}
.rs-lbl{font-size:9.5px;color:rgba(255,255,255,0.48);margin-top:2px;font-family:'JetBrains Mono',monospace;}
.rev-item{background:var(--card);border-radius:11px;border:1px solid var(--border);padding:11px 14px;margin-bottom:7px;display:flex;gap:10px;}
.rev-num{width:26px;height:26px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--muted);flex-shrink:0;}
.rev-q{font-size:12.5px;color:var(--text);line-height:1.45;margin-bottom:3px;}
.rev-topic{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.rev-ans{font-size:10.5px;color:var(--success);margin-top:3px;font-family:'JetBrains Mono',monospace;}
.rev-ans-text{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.5;padding:5px 9px;background:var(--bg);border-radius:6px;font-style:italic;}
.btn-ulang{width:100%;padding:13px;background:var(--accent);color:var(--navy);border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:7px;transition:opacity 0.2s;}
.btn-ulang:hover{opacity:0.85;}
.btn-back{width:100%;padding:11px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:11px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:background 0.15s;margin-bottom:7px;}
.btn-back:hover{background:var(--bg);}

/* ============ MODE SELECTOR (Latihan vs Simulasi Ujian) ============ */
.mode-selector{background:var(--card);border-radius:13px;border:1px solid var(--border);padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(13,27,42,0.05);}
.mode-sel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.mode-sel-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}

function loadLocal(){
  try{
    const s=localStorage.getItem('aq_state');
    if(s){
      const p=JSON.parse(s);
      ST.babs=p.babs||[];
      ST.answers=p.answers||{};
      ST.scores=p.scores||{};
      ST.mode=p.mode||'latihan';
      ST.timerSec=(typeof p.timerSec==='number')?p.timerSec:180;
      ST.revealMode=p.revealMode||'end';
    }
  }catch(e){}
  if(ST.babs.length===0){ST.babs=[DEMO];}
}

function saveLocal(){
  try{localStorage.setItem('aq_state',JSON.stringify({
    babs:ST.babs,answers:ST.answers,scores:ST.scores,
    mode:ST.mode,timerSec:ST.timerSec,revealMode:ST.revealMode
  }));}catch(e){}
}

async function loadOnline(){
  if(SUPABASE_URL==='YOUR_SUPABASE_URL') return false;
  try{
    setStatus('cfg','Menghubungkan ke server…');
    const babs=await sb.getBabs();
    if(!babs) return false;
    if(babs.length>0) ST.babs=babs;
    ST.online=true;
    const prog=await sb.getProgress(UID);
    if(prog){
      prog.forEach(p=>{
        if(!ST.answers[p.bab_id])ST.answers[p.bab_id]={};
        ST.answers[p.bab_id][p.soal_idx]={text:p.answer_text||'',done:p.done};
      });
    }
    return true;
  }catch(e){return false;}
}

function fmtTime(sec){
  const m=Math.floor(sec/60),s=sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function startTimer(sec,onEnd){
  stopTimer();
  ST.timer.remaining=sec;
  ST.timer.paused=false;
  updateTimerUI();
  ST.timer.interval=setInterval(()=>{
    if(ST.timer.paused)return;
    ST.timer.remaining--;
    updateTimerUI();
    if(ST.timer.remaining<=0){
      stopTimer();
      if(typeof onEnd==='function')onEnd();
    }
  },1000);
}

function stopTimer(){
  if(ST.timer.interval){clearInterval(ST.timer.interval);ST.timer.interval=null;}
}

function pauseToggleTimer(){
  ST.timer.paused=!ST.timer.paused;
  const b=document.getElementById('timerPauseBtn');
  if(b)b.textContent=ST.timer.paused?'▶ Lanjut':'⏸ Jeda';
}

function updateTimerUI(){
  const valEl=document.getElementById('timerVal');
  const fillEl=document.getElementById('timerFill');
  if(!valEl||!fillEl)return;
  const total=ST.timerSec||1;
  const rem=ST.timer.remaining;
  valEl.textContent=fmtTime(Math.max(0,rem));
  const pct=Math.max(0,Math.min(100,(rem/total)*100));
  fillEl.style.width=pct+'%';
  // Warna berdasarkan sisa waktu
  valEl.classList.remove('warn','danger');
  fillEl.classList.remove('warn','danger');
  if(rem<=10){valEl.classList.add('danger');fillEl.classList.add('danger');}
  else if(rem<=30){valEl.classList.add('warn');fillEl.classList.add('warn');}
}

// PARSER HTML
// ============================================================
function parseHTML(html,filename){
  const doc=new DOMParser().parseFromString(html,'text/html');
  let title=doc.querySelector('title')?.textContent||filename.replace(/\.html?$/i,'');
  title=title.substring(0,55);
  let scenario='',vitals=[];
  const sb2=doc.querySelector('.scenario-box');
  if(sb2)sb2.querySelectorAll('p').forEach(p=>{scenario+=p.innerHTML+'<br><br>';});
  doc.querySelectorAll('.vital-item').forEach(vi=>{
    const l=vi.querySelector('.label,.vital-label')?.textContent?.trim()||'';
    const v=vi.querySelector('.value,.vital-val')?.textContent?.trim()||'';
    const u=vi.querySelector('.unit,.vital-unit')?.textContent?.trim()||'';
    const c=vi.classList.contains('alert')?'alert':vi.classList.contains('warn')?'warn':'';
    if(l&&v)vitals.push({label:l,val:v,unit:u,cls:c});
  });
  let soals=[];
  doc.querySelectorAll('.question-card').forEach(card=>{
    const topic=card.querySelector('.q-label')?.textContent?.trim()||'';
    const text=card.querySelector('.q-title')?.textContent?.trim()||'';
    const inti=card.querySelector('.answer-intro')?.innerHTML||'';
    if(!text)return;
    let poin=[];
    const body=card.querySelector('.q-body');
    if(body){
      body.querySelectorAll('.section-label').forEach(sl=>{
        const lbl=sl.textContent.trim();let items=[],tableData=null;
        let el=sl.nextElementSibling;
        while(el&&!el.classList.contains('section-label')&&!el.classList.contains('citation-box')&&!el.classList.contains('callout')){
          if(el.tagName==='TABLE'||el.querySelector('table')){
            const t=el.tagName==='TABLE'?el:el.querySelector('table');
            const head=[],rows=[];
            t.querySelectorAll('thead th').forEach(th=>head.push(th.textContent.trim()));
            t.querySelectorAll('tbody tr').forEach(tr=>{const r=[];tr.querySelectorAll('td').forEach(td=>r.push(td.innerHTML.trim()));if(r.length)rows.push(r);});
            if(head.length)tableData={head,rows};
          }else if(el.tagName==='UL'||el.tagName==='OL'){el.querySelectorAll('li').forEach(li=>items.push(li.innerHTML.trim()));}
          el=el.nextElementSibling;
        }
        if(items.length||tableData)poin.push({label:lbl,items:items.length?items:undefined,table:tableData||undefined});
      });
    }
    let callout=null;
    const ce=card.querySelector('.callout-danger,.callout-warning,.callout-info,.callout-success');
    if(ce){
      const icon=ce.querySelector('.callout-icon')?.textContent||'ℹ️';
      const bd=ce.querySelector('div:not(.callout-icon)');
      const type=ce.classList.contains('callout-danger')?'danger':ce.classList.contains('callout-warning')?'warning':ce.classList.contains('callout-success')?'success':'info';
      callout={type,icon:icon.trim(),text:bd?bd.innerHTML:''};
    }
    let refs=[];
    card.querySelectorAll('.cite-item').forEach(ci=>refs.push(ci.textContent.replace('•','').trim()));
    soals.push({topic,text,inti,poin,callout,refs});
  });
  if(soals.length===0){
    doc.querySelectorAll('h2,h3').forEach(h=>{
      const t=h.textContent.trim();
      if(t.length>20&&t.length<300)soals.push({topic:'Pertanyaan',text:t,inti:'',poin:[],callout:null,refs:[]});
    });
  }
  return {
    id:'bab_'+Date.now()+'_'+Math.random().toString(36).slice(2),
    title,subtitle:filename,
    icon:BAB_ICONS[ST.babs.length%BAB_ICONS.length],
    color:BAB_COLORS[ST.babs.length%BAB_COLORS.length],
    source:filename,scenario,vitals,soals
  };
}

// ============================================================
async function handleFiles(e){
  const files=Array.from(e.target.files);
  if(!files.length)return;
  for(const file of files){
    await new Promise(res=>{
      const reader=new FileReader();
      reader.onload=async ev=>{
        try{
          const bab=parseHTML(ev.target.result,file.name);
          if(bab.soals.length===0){toast('⚠️ Tidak ada soal di '+file.name);}
          else if(ST.babs.find(b=>b.source===file.name)){toast('⚠️ '+file.name+' sudah ada');}
          else{
            ST.babs.push(bab);saveLocal();renderSidebar();
            if(ST.online){
              toast('⏳ Upload "'+bab.title+'" ke server…');
              const ok=await sb.insertBab(bab);
              toast(ok?'✅ "'+bab.title+'" tersimpan online ('+bab.soals.length+' soal)':'✅ Tersimpan lokal (offline)');
            }else{toast('✅ "'+bab.title+'" ditambahkan — '+bab.soals.length+' soal');}
          }
        }catch(err){toast('❌ Gagal memproses '+file.name);}
        res();
      };
      reader.readAsText(file,'UTF-8');
    });
  }
  e.target.value='';
}

function setupDrop(el){
  if(!el)return;
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag');});
  el.addEventListener('dragleave',()=>el.classList.remove('drag'));
  el.addEventListener('drop',e=>{
    e.preventDefault();el.classList.remove('drag');
    const files=Array.from(e.dataTransfer.files).filter(f=>/\.html?$/i.test(f.name));
    if(files.length)handleFiles({target:{files,value:''},target:{files}});
  });
}

function renderPembahasan(soal){
  let h=`<div style="display:flex;align-items:center;gap:9px;margin-bottom:10px;">
    <div style="width:30px;height:30px;border-radius:50%;background:var(--success);display:flex;align-items:center;justify-content:center;font-size:15px;">📋</div>
    <div><div style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--success);">Pembahasan Lengkap</div>
    <div style="font-size:12.5px;font-weight:500;">Kunci Jawaban & Penjelasan</div></div></div>
  <div class="ans-key"><div class="ak-lbl">Jawaban Inti</div><div class="ak-body">${soal.inti||'Lihat penjelasan di bawah.'}</div></div>`;
  (soal.poin||[]).forEach(p=>{
    h+=`<div class="det-block"><div class="det-hdr">${p.label}</div><div class="det-body">`;
    if(p.items&&p.items.length)h+='<ul>'+p.items.map(i=>`<li>${i}</li>`).join('')+'</ul>';
    if(p.table){
      h+=`<div class="tbl-wrap"><table class="mini-tbl"><thead><tr>${p.table.head.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>`;
      p.table.rows.forEach(r=>{h+='<tr>'+r.map(c=>`<td>${c}</td>`).join('')+'</tr>';});
      h+='</tbody></table></div>';
    }
    h+=`</div></div>`;
  });
  if(soal.callout){const c=soal.callout;h+=`<div class="callout callout-${c.type}"><span class="callout-icon">${c.icon}</span><div>${c.text}</div></div>`;}
  if(soal.refs&&soal.refs.length){
    h+=`<div class="cite-block"><div class="cite-lbl">📚 Referensi</div>`;
    soal.refs.forEach(r=>{h+=`<div class="cite-item">• ${r}</div>`;});
    h+=`</div>`;
  }
  return h;
}

  const stats=getOverallScoreStats();
  // Hero stats — tambahkan ring skor jika sudah ada self-assessment
  let scoreRingHtml='';
  if(stats.total>0){
    scoreRingHtml=`<div class="score-ring-grid">
      ${RUBRIC_LABELS.map((r,i)=>`<div class="score-ring"><div class="score-ring-val">${stats.counts[i]}</div><div class="score-ring-lbl">${r.emoji} ${r.lbl}</div></div>`).join('')}
    </div>`;
  }
  // Mode selector
  const modeHtml=`
    <div class="mode-selector">
      <div class="mode-sel-hdr">
        <span class="mode-sel-title">Mode Belajar</span>
        <button class="mode-sel-cfg" onclick="openSettingModal()">⚙ Pengaturan</button>
      </div>
      <div class="mode-tabs">
        <div class="mode-tab${ST.mode==='latihan'?' active':''}" onclick="setMode('latihan')">
          <div class="mode-tab-icon">📚</div>
          <div class="mode-tab-name">Latihan</div>
          <div class="mode-tab-desc">Pembahasan langsung</div>
        </div>
        <div class="mode-tab${ST.mode==='simulasi'?' active':''}" onclick="setMode('simulasi')">
          <div class="mode-tab-icon">🎯</div>
          <div class="mode-tab-name">Simulasi Ujian</div>
          <div class="mode-tab-desc">${ST.timerSec?fmtTime(ST.timerSec)+' / soal':'tanpa timer'}</div>
        </div>
      </div>
    </div>`;
  const cards=ST.babs.map(bab=>{
    const p=getProgress(bab);
    const badge=p.pct===100?`<span class="badge-done">✅ Selesai</span>`:p.done===0?`<span class="badge-new">Baru</span>`:`<span class="badge-new">${p.done}/${p.total}</span>`;
    return `<div class="bab-card" onclick="showBabDetail('${bab.id}')">
      <div class="bab-card-top"><div class="bab-card-icon" style="background:${bab.color}18;">${bab.icon}</div>
        <div class="bab-card-info"><div class="bab-card-title">${bab.title}</div><div class="bab-card-sub">${bab.soals.length} soal · ${bab.subtitle||''}</div></div>${badge}</div>
      <div class="bab-card-bot">
        <div style="font-size:10.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;">${p.done}/${p.total}</div>
        <div class="prog-track"><div class="prog-fill" style="width:${p.pct}%"></div></div>
        <div class="prog-pct">${p.pct}%</div></div></div>`;
  }).join('');
  const upload=`<div class="sec-head" style="margin-top:20px;">Tambah Bab Baru</div>
    <div class="upload-zone" id="uploadZone" onclick="triggerUpload()">
      <div class="upload-zone-icon">📂</div>
      <div class="upload-zone-title">Upload file HTML soal</div>
      <div class="upload-zone-sub">Drag & drop atau klik untuk memilih file HTML.</div></div>`;
  document.getElementById('contentArea').innerHTML=`
    <div class="dash-hero">
      <h2>Selamat Belajar, <span>Dokter! 👨‍⚕️</span></h2>
      <p>Platform belajar anestesiologi berbasis kasus klinis.</p>
      <div class="dash-stats">
        <div class="dash-stat"><div class="dash-stat-val">${ST.babs.length}</div><div class="dash-stat-lbl">Bab</div></div>
        <div class="dash-stat"><div class="dash-stat-val">${total}</div><div class="dash-stat-lbl">Soal</div></div>
        <div class="dash-stat"><div class="dash-stat-val">${pct}%</div><div class="dash-stat-lbl">Progres</div></div>
      </div>
      ${scoreRingHtml}
    </div>
    ${modeHtml}
    <div class="sec-head">Daftar Bab</div>
    <div class="bab-grid">${cards||'<p style="color:var(--muted);font-size:13px;">Belum ada bab.</p>'}</div>
    ${upload}`;
  setupDrop(document.getElementById('uploadZone'));
}

function showBabDetail(babId){
  const bab=ST.babs.find(b=>b.id===babId);if(!bab)return;
  ST.view='bab';ST.currentBab=babId;
  stopTimer();
  document.getElementById('topbarTitle').textContent=bab.title;
  document.getElementById('topbarCrumb').innerHTML=`<span class="mode-badge ${ST.mode}">${ST.mode==='simulasi'?'🎯 Simulasi':'📚 Latihan'}</span> ${bab.soals.length} soal`;
  renderSidebar();closeSidebar();
  const p=getProgress(bab);const ans=ST.answers[babId]||{};
  const vitHtml=bab.vitals&&bab.vitals.length?`<div class="vital-grid">${bab.vitals.map(v=>`<div class="vi ${v.cls||''}"><div class="vi-lbl">${v.label}</div><div class="vi-val">${v.val}</div><div class="vi-unit">${v.unit}</div></div>`).join('')}</div>`:'';
  const scenHtml=bab.scenario?`<div class="scen-card"><div class="scen-hdr"><div class="dot"></div><span>Skenario Kasus Klinis</span></div><div class="scen-body"><p>${bab.scenario}</p>${vitHtml}</div></div>`:'';
  // Mode selector ringkas
  const modeHtml=`
    <div class="mode-selector">
      <div class="mode-sel-hdr">
        <span class="mode-sel-title">Mode Belajar</span>
        <button class="mode-sel-cfg" onclick="openSettingModal()">⚙ Pengaturan</button>
      </div>
      <div class="mode-tabs">
        <div class="mode-tab${ST.mode==='latihan'?' active':''}" onclick="setMode('latihan')">
          <div class="mode-tab-icon">📚</div>
          <div class="mode-tab-name">Latihan</div>
          <div class="mode-tab-desc">Pembahasan langsung</div>
        </div>
        <div class="mode-tab${ST.mode==='simulasi'?' active':''}" onclick="setMode('simulasi')">
          <div class="mode-tab-icon">🎯</div>
          <div class="mode-tab-name">Simulasi Ujian</div>
          <div class="mode-tab-desc">${ST.timerSec?fmtTime(ST.timerSec)+' / soal':'tanpa timer'}</div>
        </div>
      </div>
    </div>`;
  const soalRows=bab.soals.map((s,i)=>{
    const done=ans[i]&&ans[i].done;
    const score=getScore(babId,i);
    const scoreBadge=(score!==undefined)?`<span class="score-badge" data-score="${score}">${RUBRIC_LABELS[score].emoji} ${RUBRIC_LABELS[score].lbl}</span>`:'';
    return `<div class="soal-row ${done?'done':''}" onclick="showSoal('${babId}',${i})">
      <div class="soal-num">${i+1}</div>
      <div style="flex:1;"><div class="soal-topic">${s.topic}</div><div class="soal-text">${s.text.substring(0,88)}…</div>${done?`<div class="soal-done">✅ Sudah dijawab ${scoreBadge}</div>`:''}</div></div>`;
  }).join('');
  const btnLbl=p.done===p.total&&p.total>0?'↺ Ulangi Semua':p.done===0?(ST.mode==='simulasi'?'🎯 Mulai Simulasi':'▶ Mulai Quiz'):'▶ Lanjutkan Quiz';
  document.getElementById('contentArea').innerHTML=`
    <div class="bab-hero" style="background:linear-gradient(135deg,${bab.color},${bab.color}cc);">
      <div class="bab-hero-badge">${bab.icon} Anestesiologi</div>
      <h2>${bab.title}</h2><p>${bab.subtitle||bab.source}</p>
      <div class="bab-pills"><span class="bab-pill"><span class="dot"></span>${bab.soals.length} Soal</span><span class="bab-pill"><span class="dot"></span>${p.done} Selesai</span><span class="bab-pill"><span class="dot"></span>${p.pct}% Progres</span></div></div>
    ${scenHtml}
    ${modeHtml}
    <button class="btn-main" onclick="showSoal('${babId}',${p.done<p.total?p.done:0})">${btnLbl}</button>
    <div class="sec-head">Daftar Soal</div>
    ${soalRows}`;
}

function showSoal(babId,idx){
  const bab=ST.babs.find(b=>b.id===babId);if(!bab)return;
  ST.view='quiz';ST.currentBab=babId;ST.currentSoal=idx;
  const soal=bab.soals[idx];if(!soal){showResult(babId);return;}
  document.getElementById('topbarTitle').textContent=bab.title;
  document.getElementById('topbarCrumb').innerHTML=`<span class="mode-badge ${ST.mode}">${ST.mode==='simulasi'?'🎯':'📚'}</span> ${idx+1}/${bab.soals.length}`;
  renderSidebar();closeSidebar();
  stopTimer();

  const pct=Math.round(idx/bab.soals.length*100);
  const ans=(ST.answers[babId]||{})[idx];
  const prev=ans?.text||'';const done=ans?.done||false;

  // Tentukan apakah pembahasan boleh ditampilkan
  // - Mode latihan: selalu boleh setelah submit
  // - Mode simulasi + revealMode 'each': boleh setelah submit
  // - Mode simulasi + revealMode 'end': hanya jika sudah submit DAN ini soal terakhir, atau via tombol Lihat Pembahasan dari halaman result
  const inSimulasi = ST.mode==='simulasi';
  const revealEach = ST.revealMode==='each';
  const showPembahasanNow = done && (!inSimulasi || revealEach);

  // Timer bar untuk mode simulasi (jika belum done)
  let timerHtml='';
  if(inSimulasi && !done && ST.timerSec>0){
    timerHtml=`
      <div class="timer-bar">
        <div class="timer-icon">⏱</div>
        <div class="timer-info">
          <div class="timer-lbl">Sisa Waktu</div>
          <div class="timer-val" id="timerVal">${fmtTime(ST.timerSec)}</div>
        </div>
        <button class="timer-pause" id="timerPauseBtn" onclick="pauseToggleTimer()">⏸ Jeda</button>
        <div class="timer-track"><div class="timer-track-fill" id="timerFill" style="width:100%"></div></div>
      </div>`;
  }

  // Info lock di mode simulasi
  let lockInfo='';
  if(inSimulasi && !done){
    if(ST.revealMode==='end'){
      lockInfo=`<div class="exam-lock-info"><span class="ic">🔒</span><div><strong>Mode Simulasi Ujian.</strong> Pembahasan akan dibuka setelah <strong>semua soal selesai</strong>. Submit jawaban untuk lanjut ke soal berikutnya.</div></div>`;
    }else{
      lockInfo=`<div class="exam-lock-info"><span class="ic">🎯</span><div><strong>Mode Simulasi Ujian.</strong> Pembahasan akan terbuka setelah Anda submit jawaban (atau waktu habis).</div></div>`;
    }
  }

  // Tombol submit text — beda di mode simulasi
  const submitLbl = inSimulasi
    ? (idx===bab.soals.length-1 ? 'Submit & Selesai' : 'Submit & Soal Berikutnya')
    : 'Lihat Pembahasan';

  document.getElementById('contentArea').innerHTML=`
    ${timerHtml}
    <div class="qpb"><div class="qpb-top"><span class="qpb-lbl">Soal ${idx+1} dari ${bab.soals.length}</span><span class="qpb-pct">${pct}%</span></div><div class="qpb-track"><div class="qpb-fill" style="width:${pct}%"></div></div></div>
    <div class="q-card">
      <div class="q-hdr"><div class="q-num-c">${idx+1}</div><div><div class="q-hdr-topic">${soal.topic}</div><div class="q-hdr-text">${soal.text}</div></div></div>
      <div class="q-body">
        <textarea class="essay-area" id="essayInput" placeholder="Tulis jawaban Anda di sini…" rows="5" ${done?'disabled':''} oninput="checkEssay()">${prev}</textarea>
        <div class="essay-hint">✏️ Tulis poin-poin utama${inSimulasi?', verbalize dalam hati seakan menjawab konsulen.':', lalu lihat pembahasan.'}</div>
        ${lockInfo}
        <button class="btn-submit" id="btnSubmit" onclick="submitAnswer('${babId}',${idx})" ${prev.trim().length<3||done?'disabled':''} ${done?'style="display:none"':''}>${submitLbl}</button>
        <div id="pemArea" style="display:${showPembahasanNow?'block':'none'};">${showPembahasanNow?`<div class="pembahasan">${renderPembahasan(soal)}</div>${renderRubric(babId,idx)}${nextBtn(babId,idx)}`:''}</div>
        ${done && inSimulasi && !revealEach ? `<div class="exam-lock-info" style="margin-top:14px;"><span class="ic">✅</span><div>Jawaban tersimpan. Pembahasan akan terbuka di akhir simulasi.</div></div>${nextBtn(babId,idx)}` : ''}
      </div></div>`;

  // Start timer kalau perlu
  if(inSimulasi && !done && ST.timerSec>0){
    startTimer(ST.timerSec,()=>{
      // Auto-submit ketika waktu habis
      const inp=document.getElementById('essayInput');
      if(inp && !inp.disabled){
        // Pastikan ada minimal teks (auto-fill jika kosong agar tidak di-block)
        if(inp.value.trim().length<3)inp.value='(tidak terjawab — waktu habis)';
        submitAnswer(babId,idx,true);
      }
    });
  }

  window.scrollTo({top:0,behavior:'smooth'});
}

function checkEssay(){
  const v=document.getElementById('essayInput')?.value?.trim()||'';
  const b=document.getElementById('btnSubmit');
  if(b)b.disabled=v.length<3;
}

async function submitAnswer(babId,idx,timeoutTriggered){
  const bab=ST.babs.find(b=>b.id===babId);
  const soal=bab.soals[idx];
  const text=document.getElementById('essayInput').value.trim();
  if(!ST.answers[babId])ST.answers[babId]={};
  ST.answers[babId][idx]={text,done:true,ts:Date.now(),timeout:!!timeoutTriggered};
  saveLocal();renderSidebar();
  stopTimer();
  if(ST.online)sb.upsertProgress(UID,babId,idx,text);

  const inSimulasi = ST.mode==='simulasi';
  const revealEach = ST.revealMode==='each';
  const isLast = idx === bab.soals.length-1;

  // Disable input
  document.getElementById('essayInput').disabled=true;
  const subBtn=document.getElementById('btnSubmit');if(subBtn)subBtn.style.display='none';

  if(inSimulasi && !revealEach){
    // Mode simulasi + reveal di akhir → langsung lanjut ke soal berikutnya atau ke result
    if(timeoutTriggered)toast('⏰ Waktu habis — auto submit');
    if(isLast){
      setTimeout(()=>showResult(babId),350);
    }else{
      setTimeout(()=>showSoal(babId,idx+1),350);
    }
    return;
  }

  // Mode latihan atau simulasi 'each': tampilkan pembahasan + rubrik
  const area=document.getElementById('pemArea');
  area.style.display='block';
  area.innerHTML=`<div class="pembahasan">${renderPembahasan(soal)}</div>${renderRubric(babId,idx)}${nextBtn(babId,idx)}`;
  setTimeout(()=>area.scrollIntoView({behavior:'smooth',block:'start'}),100);
  if(timeoutTriggered)toast('⏰ Waktu habis — jawaban dikunci');
}

function showResult(babId){
  const bab=ST.babs.find(b=>b.id===babId);if(!bab)return;
  ST.view='result';
  stopTimer();
  document.getElementById('topbarTitle').textContent='Hasil Quiz';
  document.getElementById('topbarCrumb').innerHTML=`<span class="mode-badge ${ST.mode}">${ST.mode==='simulasi'?'🎯':'📚'}</span> ${bab.title}`;
  renderSidebar();
  const p=getProgress(bab);const ans=ST.answers[babId]||{};
  // Hitung rata-rata skor (dari yang sudah self-assessed)
  const sc=ST.scores[babId]||{};
  const scoredIdx=Object.keys(sc).map(k=>parseInt(k));
  const avgScore=scoredIdx.length?(scoredIdx.reduce((a,k)=>a+sc[k],0)/scoredIdx.length).toFixed(2):null;

  // Rekap detail per soal — DI MODE SIMULASI 'END', tampilkan pembahasan + rubrik inline
  const inSimulasi=ST.mode==='simulasi';
  const revealEach=ST.revealMode==='each';
  const showFullReview = inSimulasi && !revealEach; // di mode simulasi-end, hasil = saatnya buka semua

  const rows=bab.soals.map((s,i)=>{
    const a=ans[i];
    const score=getScore(babId,i);
    const scoreBadge=(score!==undefined)?`<span class="score-badge" data-score="${score}">${RUBRIC_LABELS[score].emoji} ${RUBRIC_LABELS[score].lbl}</span>`:'';
    if(showFullReview && a && a.done){
      // Tampilkan pembahasan lengkap di sini
      return `<div class="q-card" style="margin-bottom:14px;">
        <div class="q-hdr"><div class="q-num-c">${i+1}</div><div><div class="q-hdr-topic">${s.topic} ${scoreBadge}</div><div class="q-hdr-text">${s.text}</div></div></div>
        <div class="q-body">
          ${a.text?`<div style="background:var(--bg);border-radius:9px;padding:10px 12px;margin-bottom:11px;border-left:3px solid var(--steel);"><div style="font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;">Jawaban Anda${a.timeout?' (⏰ timeout)':''}</div><div style="font-size:12.5px;color:var(--text);line-height:1.6;white-space:pre-wrap;">${a.text}</div></div>`:''}
          <div class="pembahasan">${renderPembahasan(s)}</div>
          ${renderRubric(babId,i)}
        </div></div>`;
    }
    // Rekap singkat (mode latihan / simulasi-each)
    return `<div class="rev-item"><div class="rev-num">${i+1}</div><div>
      <div class="rev-q">${s.text.substring(0,75)}…</div>
      <div class="rev-topic">${s.topic} ${scoreBadge}</div>
      ${a&&a.done?`<div class="rev-ans">✅ Dijawab${a.timeout?' (⏰ timeout)':''}</div>${a.text?`<div class="rev-ans-text">"${a.text.substring(0,100)}…"</div>`:''}` : '<div style="font-size:10.5px;color:var(--warn);margin-top:3px;">⏭ Dilewati</div>'}
    </div></div>`;
  }).join('');

  const avgHtml = avgScore!==null
    ? `<div class="rs-box"><div class="rs-val">${avgScore}</div><div class="rs-lbl">Rata Skor</div></div>`
    : `<div class="rs-box"><div class="rs-val">${p.pct}%</div><div class="rs-lbl">Progres</div></div>`;

  const headerTitle = showFullReview
    ? (p.pct===100?'Simulasi Selesai! 🎯':'Simulasi Berakhir')
    : (p.pct===100?'Bab Selesai! 🎉':'Quiz Selesai!');
  const headerSub = showFullReview
    ? 'Bandingkan jawaban Anda dengan pembahasan. Beri penilaian pada tiap soal.'
    : (p.pct===100?'Semua soal sudah dijawab. Luar biasa!':'Terus berlatih!');

  document.getElementById('contentArea').innerHTML=`
    <div class="result-hero">
      <div class="result-circle"><div class="result-num">${p.done}/${p.total}</div><div class="result-num-lbl">selesai</div></div>
      <div class="result-title">${headerTitle}</div>
      <div class="result-sub">${headerSub}</div>
      <div class="result-stats">
        <div class="rs-box"><div class="rs-val">${p.done}</div><div class="rs-lbl">Dijawab</div></div>
        <div class="rs-box"><div class="rs-val">${p.total}</div><div class="rs-lbl">Total</div></div>
        ${avgHtml}
      </div></div>
    <div class="sec-head">${showFullReview?'Review Lengkap & Self-Assessment':'Rekap Jawaban'}</div>
    <div style="margin-bottom:18px;">${rows}</div>
    <button class="btn-ulang" onclick="showSoal('${babId}',0)">↺ Ulangi Semua Soal</button>
    <button class="btn-back" onclick="showBabDetail('${babId}')">← Kembali ke Bab</button>
    <button class="btn-back" onclick="showDashboard()">🏠 Dashboard</button>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

// ============================================================
// INIT — satu titik masuk, tidak ada duplikat
// ============================================================
(async()=>{
  // 0. Init listener untuk modal pengaturan
  initModalListeners();

  // 1. Load data lokal dulu (cepat)
  loadLocal();
  renderSidebar();
  showDashboard();

  // 2. Coba koneksi Supabase (background)
  if(SUPABASE_URL!=='YOUR_SUPABASE_URL'){
    const ok=await loadOnline();
    if(ok){
      ST.online=true;
      setStatus('ok','🌐 Online — soal & progres tersinkron ke server');
      toast('🌐 Terhubung ke server');
      renderSidebar();
      showDashboard();
    }else{
      setStatus('off','📱 Offline — server tidak terjangkau, data tersimpan lokal');
    }
  }else{
    setStatus('cfg','Mode Offline — isi SUPABASE_URL & KEY untuk aktifkan mode Online');
  }
})();
</script>
</body>
</html>
